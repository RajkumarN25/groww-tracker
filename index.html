<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groww Trading Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #00d09c; /* Groww Green */
            --danger: #e74c3c;
            --text-main: #333;
            --text-muted: #777;
            --border: #e0e0e0;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { text-align: center; color: var(--text-main); }
        
        /* Summary Grid */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { margin: 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase;}
        .card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: var(--primary); }
        .negative { color: var(--danger) !important; }
        
        /* Input Forms Layout */
        .forms-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .form-card { background: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-card h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-expense { background-color: var(--danger); }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: #2c3e50; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 Trading Dashboard</h1>
    
    <div class="summary-grid">
        <div class="card">
            <h3>Final Balance</h3>
            <p id="calc-final-balance">₹0</p>
        </div>
        <div class="card">
            <h3>Net Profit</h3>
            <p id="calc-net-profit">₹0</p>
        </div>
        <div class="card">
            <h3>Total Withdrawals</h3>
            <p id="calc-withdrawals" class="negative">₹0</p>
        </div>
        <div class="card">
            <h3>Win Rate</h3>
            <p id="calc-win-rate">0%</p>
        </div>
    </div>

    <div class="forms-container">
        <div class="form-card">
            <h2>➕ Add Daily Trade</h2>
            <form id="form-trade">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="trade-date" required>
                </div>
                <div class="form-group">
                    <label>Instrument (e.g. SENSEX [PUT])</label>
                    <input type="text" id="trade-instrument" required>
                </div>
                <div class="form-group">
                    <label>Outcome</label>
                    <select id="trade-outcome">
                        <option value="PROFIT">PROFIT</option>
                        <option value="LOSS">LOSS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>P&L Amount (Use negative for loss, e.g. -400)</label>
                    <input type="number" id="trade-pnl" required>
                </div>
                <button type="submit">Record Trade</button>
            </form>
        </div>

        <div class="form-card">
            <h2>💸 Add Expense / Withdrawal</h2>
            <form id="form-expense">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="expense-date" required>
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="expense-amount" min="1" required>
                </div>
                <div class="form-group">
                    <label>Reason (e.g. Food, Trip, EMI)</label>
                    <input type="text" id="expense-reason" required>
                </div>
                <button type="submit" class="btn-expense">Record Expense</button>
            </form>
        </div>
    </div>

    <h2 style="margin-top: 40px;">Recent Trades</h2>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Instrument</th>
                <th>Outcome</th>
                <th>P&L (₹)</th>
            </tr>
        </thead>
        <tbody id="trade-table-body">
            </tbody>
    </table>
</div>

<script type="module">
    // --- 1. IMPORT FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
    import { addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    // --- 2. YOUR EXACT FIREBASE CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyBtMGB7mAjP6xyOgjA-a95XnkC16TNLMYE",
      authDomain: "groww-tracker-ebb9d.firebaseapp.com",
      projectId: "groww-tracker-ebb9d",
      storageBucket: "groww-tracker-ebb9d.firebasestorage.app",
      messagingSenderId: "462510334064",
      appId: "1:462510334064:web:250c5121d5e435f5ae54b5",
      measurementId: "G-QC64Y7RTJH"
    };

    // Initialize Firebase and Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 3. CONFIGURATION (Based on your tracking sheets) ---
    const STARTING_CAPITAL = 184000;
    const ADDED_INVESTMENT = 100000;

    let db_trades = [];
    let db_withdrawals = [];

    // --- 4. FETCH DATA FROM FIRESTORE ---
    async function fetchLiveDashboardData() {
        db_trades = [];
        db_withdrawals = [];

        try {
            // Pull Trades
            const tradesSnapshot = await getDocs(collection(db, "trades"));
            tradesSnapshot.forEach((doc) => {
                if (doc.data().date) { // Dynamic filter for blank dummy setups
                    db_trades.push(doc.data());
                }
            });

            // Pull Withdrawals
            const withdrawalsSnapshot = await getDocs(collection(db, "withdrawals"));
            withdrawalsSnapshot.forEach((doc) => {
                if (doc.data().date) {
                    db_withdrawals.push(doc.data());
                }
            });

            runCalculations();
        } catch (error) {
            console.error("Error fetching data:", error);
            alert("Could not connect to database. Make sure your Firestore rules are set correctly.");
        }
    }

    // --- 5. CALCULATIONS ENGINE ---
    function runCalculations() {
        let totalPnl = 0;
        let winningTrades = 0;
        
        db_trades.forEach(trade => {
            totalPnl += trade.pnl;
            if (trade.outcome === "PROFIT" || trade.pnl > 0) winningTrades++;
        });

        let totalWithdrawals = 0;
        db_withdrawals.forEach(w => { totalWithdrawals += w.amount; });

        const winRate = db_trades.length > 0 ? ((winningTrades / db_trades.length) * 100).toFixed(1) : 0;
        const finalBalance = STARTING_CAPITAL + ADDED_INVESTMENT + totalPnl - totalWithdrawals;

        // Update Dashboard Text
        document.getElementById('calc-final-balance').innerText = `₹${finalBalance.toLocaleString('en-IN')}`;
        document.getElementById('calc-net-profit').innerText = `₹${totalPnl.toLocaleString('en-IN')}`;
        document.getElementById('calc-withdrawals').innerText = `₹${totalWithdrawals.toLocaleString('en-IN')}`;
        document.getElementById('calc-win-rate').innerText = `${winRate}%`;

        // Render Table (Sort by newest date first)
        const sortedTrades = [...db_trades].sort((a, b) => new Date(b.date) - new Date(a.date));
        const tbody = document.getElementById('trade-table-body');
        tbody.innerHTML = '';
        sortedTrades.forEach(trade => {
            const row = `<tr>
                <td>${trade.date}</td>
                <td>${trade.instrument}</td>
                <td>${trade.outcome}</td>
                <td style="color: ${trade.pnl >= 0 ? '#00d09c' : '#e74c3c'}; font-weight:bold;">
                    ${trade.pnl >= 0 ? '+' : ''}${trade.pnl}
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // --- 6. EVENT LISTENERS (Save to Firestore) ---
    
    // Submit New Trade
    document.getElementById('form-trade').addEventListener('submit', async function(e) {
        e.preventDefault(); 
        
        const btn = this.querySelector('button');
        btn.innerText = "Saving...";

        const newTrade = {
            date: document.getElementById('trade-date').value,
            instrument: document.getElementById('trade-instrument').value,
            outcome: document.getElementById('trade-outcome').value,
            pnl: parseFloat(document.getElementById('trade-pnl').value)
        };

        try {
            await addDoc(collection(db, "trades"), newTrade);
            this.reset();
            fetchLiveDashboardData(); 
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("Error saving trade.");
        } finally {
            btn.innerText = "Record Trade";
        }
    });

    // Submit New Expense/Withdrawal
    document.getElementById('form-expense').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = this.querySelector('button');
        btn.innerText = "Saving...";

        const newExpense = {
            date: document.getElementById('expense-date').value,
            amount: parseFloat(document.getElementById('expense-amount').value),
            reason: document.getElementById('expense-reason').value
        };

        try {
            await addDoc(collection(db, "withdrawals"), newExpense);
            this.reset();
            fetchLiveDashboardData();
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("Error saving expense.");
        } finally {
            btn.innerText = "Record Expense";
        }
    });

    // --- 7. INITIALIZE DASHBOARD ---
    fetchLiveDashboardData();

</script>
</body>
</html>
