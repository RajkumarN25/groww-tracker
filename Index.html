<!DOCTYPE html>
<html>
<head>
  <title>Groww Tracker</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:Arial;
      padding:20px;
      background:#111;
      color:white;
    }

    .card{
      background:#222;
      padding:15px;
      margin-bottom:15px;
      border-radius:12px;
    }

    input,button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
    }

    button{
      background:#00c853;
      color:white;
      font-weight:bold;
    }

    h2{
      margin-top:0;
    }
  </style>
</head>

<body>

<h1>Groww Tracker</h1>

<div class="card">
  <h2>Add Daily Earnings</h2>

  <input type="date" id="date">

  <input type="number"
         id="amount"
         placeholder="Profit Amount">

  <button onclick="addTrade()">
    Save
  </button>
</div>

<div class="card">
  <h2>Dashboard</h2>

  <p id="monthly"></p>
  <p id="overall"></p>
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxE8kDF4RSS_KZNPq7UZ09bWPWlF-Pj3-gDUxvpDhJtW1smGtKc26fDvv8EIu6XBUUAeA/exec";

async function addTrade(){

  const date =
    document.getElementById("date").value;

  const amount =
    document.getElementById("amount").value;

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      sheet:"Trades",
      row:[date,amount]
    })
  });

  alert("Saved!");

  loadDashboard();
}

async function loadDashboard(){

  const res = await fetch(API_URL);

  const data = await res.json();

  const trades = data.Trades;

  let total = 0;

  let monthly = {};

  trades.slice(1).forEach(t=>{

    const date = t[0];
    const amount = Number(t[1]);

    total += amount;

    const month =
      date.substring(0,7);

    if(!monthly[month])
      monthly[month]=0;

    monthly[month]+=amount;
  });

  let latest =
    Object.keys(monthly).pop();

  document.getElementById("monthly")
    .innerHTML =
      "Monthly Profit: ₹" +
      monthly[latest];

  document.getElementById("overall")
    .innerHTML =
      "Overall Profit: ₹" +
      total;
}

loadDashboard();

</script>

</body>
</html>
